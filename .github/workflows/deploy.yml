name: Deploy Lyria!

on:
  push:
    branches: [main]

env:
  DEPLOY_PATH: /opt/lyria

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build server binary
        working-directory: ./server
        run: |
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o lyria_server .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build admin panel
        working-directory: ./admin
        run: |
          npm ci
          VITE_API_URL=/api npm run build

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: server/lyria_server

      - name: Upload admin dist
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: admin/dist/

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: server-binary
          path: ./artifacts/server

      - name: Download admin dist
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: ./artifacts/admin

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server directories
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'PREP'
            set -e
            sudo -n mkdir -p /opt/lyria/server/uploads/{image/avatar,image/cover,image/playlist,image/music_cover,music,lyrics}
            sudo -n mkdir -p /opt/lyria/admin
            sudo -n mkdir -p /var/www/certbot
            sudo -n chown -R $USER:$USER /opt/lyria
          PREP

      - name: Install server dependencies
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'DEPS'
            set -e

            # Install nginx if not present
            if ! command -v nginx &>/dev/null; then
              echo "Installing nginx..."
              sudo -n apt-get update
              sudo -n apt-get install -y nginx
              sudo -n systemctl enable nginx
            fi

            # Install ffmpeg if not present
            if ! command -v ffmpeg &>/dev/null; then
              echo "Installing ffmpeg..."
              sudo -n apt-get update
              sudo -n apt-get install -y ffmpeg
            fi

            # Install/update yt-dlp (always update for YouTube compatibility)
            if ! command -v python3 &>/dev/null; then
              sudo -n apt-get install -y python3 python3-pip
            fi
            echo "Updating yt-dlp..."
            sudo -n pip3 install --break-system-packages --upgrade "yt-dlp[default]"

            echo "Dependencies OK"
            nginx -v
            ffmpeg -version | head -1
            yt-dlp --version
          DEPS

      - name: Deploy server binary
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sudo -n systemctl stop lyria || true"
          scp -i ~/.ssh/deploy_key ./artifacts/server/lyria_server \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/lyria/server/lyria_server
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "chmod +x /opt/lyria/server/lyria_server"

      - name: Deploy admin panel
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./artifacts/admin/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/lyria/admin/

      - name: Create .env file
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << ENVSETUP
            set -e
            cat > /opt/lyria/server/.env << 'ENVEOF'
          PORT=${{ secrets.SERVER_PORT }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          MONGODB_URL=${{ secrets.MONGODB_URL }}
          DOMAIN=${{ secrets.DOMAIN }}
          SERVER_URL=${{ secrets.SERVER_URL }}
          ENVIRONMENT=production
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}
          SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}
          ENVEOF
            echo ".env written"
          ENVSETUP

      - name: Ensure cookies.txt exists
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "[ -f /opt/lyria/server/cookies.txt ] || touch /opt/lyria/server/cookies.txt"

      - name: Create systemd service
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'SERVICE'
            set -e
            sudo -n tee /etc/systemd/system/lyria.service > /dev/null << 'EOF'
          [Unit]
          Description=Lyria Server
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/lyria/server
          EnvironmentFile=/opt/lyria/server/.env
          Environment=PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          ExecStart=/opt/lyria/server/lyria_server
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

            sudo -n systemctl daemon-reload
            sudo -n systemctl enable lyria
            echo "Systemd service configured"
          SERVICE

      - name: Configure nginx and SSL for Lyria
        run: |
          scp -i ~/.ssh/deploy_key scripts/setup-nginx-ssl.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/setup-nginx-ssl.sh
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "chmod +x /tmp/setup-nginx-ssl.sh && sudo -n bash /tmp/setup-nginx-ssl.sh"


      - name: Restart services
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'RESTART'
            set -e

            echo "Restarting lyria service..."
            sudo -n systemctl restart lyria

            echo "Testing nginx config..."
            sudo -n nginx -t

            echo "Reloading nginx..."
            sudo -n systemctl reload nginx

            sleep 3

            echo "=== Service status ==="
            sudo -n systemctl is-active lyria
            sudo -n systemctl is-active nginx

            echo "Deployment complete!"
          RESTART

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'HEALTHCHECK'
            set -e
            sleep 5

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9000/favicon.ico || echo "000")
            if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "404" ]; then
              echo "Health check failed! HTTP code: $HTTP_CODE"
              sudo -n journalctl -u lyria --no-pager -n 30
              exit 1
            fi

            echo "Health check passed! HTTP code: $HTTP_CODE"
          HEALTHCHECK

      - name: Rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ROLLBACK'
            echo "Deploy failed. Showing logs..."
            sudo -n journalctl -u lyria --no-pager -n 50 || true
            sudo -n nginx -t 2>&1 || true
            sudo -n systemctl status lyria --no-pager || true
          ROLLBACK
