name: Deploy Lyria

on:
  push:
    branches: [main]

env:
  DEPLOY_PATH: /opt/lyria

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build server binary
        working-directory: ./server
        run: |
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o lyria_server .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build admin panel
        working-directory: ./admin
        run: |
          npm ci
          VITE_API_URL=/api npm run build

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: server/lyria_server

      - name: Upload admin dist
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: admin/dist/

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: server-binary
          path: ./artifacts/server

      - name: Download admin dist
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: ./artifacts/admin

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server directories
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'PREP'
            set -e
            sudo mkdir -p /opt/lyria/server/uploads/{image/avatar,image/cover,image/playlist,image/music_cover,music,lyrics}
            sudo mkdir -p /opt/lyria/admin
            sudo mkdir -p /var/www/certbot
            sudo chown -R $USER:$USER /opt/lyria
          PREP

      - name: Install server dependencies
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'DEPS'
            set -e

            # Install nginx if not present
            if ! command -v nginx &>/dev/null; then
              echo "Installing nginx..."
              sudo apt-get update
              sudo apt-get install -y nginx
              sudo systemctl enable nginx
            fi

            # Install ffmpeg if not present
            if ! command -v ffmpeg &>/dev/null; then
              echo "Installing ffmpeg..."
              sudo apt-get update
              sudo apt-get install -y ffmpeg
            fi

            # Install yt-dlp if not present
            if ! command -v yt-dlp &>/dev/null; then
              echo "Installing yt-dlp..."
              sudo apt-get install -y python3 python3-pip
              sudo pip3 install --break-system-packages "yt-dlp[default]"
            fi

            echo "Dependencies OK"
            nginx -v
            ffmpeg -version | head -1
            yt-dlp --version
          DEPS

      - name: Deploy server binary
        run: |
          scp -i ~/.ssh/deploy_key ./artifacts/server/lyria_server \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/lyria/server/lyria_server
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "chmod +x /opt/lyria/server/lyria_server"

      - name: Deploy admin panel
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./artifacts/admin/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/lyria/admin/

      - name: Create .env file
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << ENVSETUP
            set -e
            cat > /opt/lyria/server/.env << 'ENVEOF'
          PORT=${{ secrets.SERVER_PORT }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          MONGODB_URL=${{ secrets.MONGODB_URL }}
          DOMAIN=${{ secrets.DOMAIN }}
          SERVER_URL=${{ secrets.SERVER_URL }}
          ENVIRONMENT=production
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}
          SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}
          ENVEOF
            echo ".env written"
          ENVSETUP

      - name: Ensure cookies.txt exists
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "touch /opt/lyria/server/cookies.txt"

      - name: Create systemd service
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'SERVICE'
            set -e
            sudo tee /etc/systemd/system/lyria.service > /dev/null << 'EOF'
          [Unit]
          Description=Lyria Server
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/lyria/server
          EnvironmentFile=/opt/lyria/server/.env
          ExecStart=/opt/lyria/server/lyria_server
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

            sudo systemctl daemon-reload
            sudo systemctl enable lyria
            echo "Systemd service configured"
          SERVICE

      - name: Configure nginx
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'NGINX'
            set -e

            # Main nginx config
            sudo tee /etc/nginx/nginx.conf > /dev/null << 'EOF'
          user www-data;
          worker_processes auto;
          error_log /var/log/nginx/error.log warn;
          pid /run/nginx.pid;

          events {
              worker_connections 1024;
          }

          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;

              log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                              '$status $body_bytes_sent "$http_referer" '
                              '"$http_user_agent"';

              access_log /var/log/nginx/access.log main;

              sendfile on;
              tcp_nopush on;
              keepalive_timeout 65;
              client_max_body_size 100M;

              gzip on;
              gzip_vary on;
              gzip_proxied any;
              gzip_comp_level 6;
              gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

              limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
              limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

              include /etc/nginx/conf.d/*.conf;
          }
          EOF

            # Site config
            sudo tee /etc/nginx/conf.d/lyria.conf > /dev/null << 'EOF'
          # Redirect HTTP -> HTTPS
          server {
              listen 80;
              server_name lyria.risadev.com admin.lyria.risadev.com;

              location /.well-known/acme-challenge/ {
                  root /var/www/certbot;
              }

              location / {
                  return 301 https://$host$request_uri;
              }
          }

          # API Server — mobile app connects here
          server {
              listen 443 ssl;
              http2 on;
              server_name lyria.risadev.com;

              ssl_certificate     /etc/letsencrypt/live/lyria.risadev.com/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/lyria.risadev.com/privkey.pem;

              location / {
                  proxy_pass         http://127.0.0.1:9000;
                  proxy_http_version 1.1;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection "upgrade";
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;

                  proxy_buffering off;
                  proxy_cache     off;
                  proxy_read_timeout 86400s;
                  proxy_send_timeout 86400s;
              }

              location /auth/login {
                  limit_req  zone=auth burst=3 nodelay;
                  proxy_pass http://127.0.0.1:9000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              location /auth/register {
                  limit_req  zone=auth burst=3 nodelay;
                  proxy_pass http://127.0.0.1:9000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }

          # Admin Panel
          server {
              listen 443 ssl;
              http2 on;
              server_name admin.lyria.risadev.com;

              ssl_certificate     /etc/letsencrypt/live/lyria.risadev.com/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/lyria.risadev.com/privkey.pem;

              root /opt/lyria/admin;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              location /api/ {
                  limit_req  zone=api burst=20 nodelay;
                  proxy_pass http://127.0.0.1:9000/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                  expires 1y;
                  add_header Cache-Control "public, immutable";
              }
          }
          EOF

            # Remove default site if exists
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo rm -f /etc/nginx/conf.d/default.conf

            echo "Nginx configured"
          NGINX

      - name: Setup SSL certificates
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'SSL'
            set -e

            # Install certbot if needed
            if ! command -v certbot &>/dev/null; then
              echo "Installing certbot..."
              sudo apt-get update
              sudo apt-get install -y certbot python3-certbot-nginx
            fi

            # Check if certs already exist
            if [ ! -f /etc/letsencrypt/live/lyria.risadev.com/fullchain.pem ]; then
              echo "Obtaining SSL certificates..."
              sudo certbot --nginx \
                -d lyria.risadev.com \
                -d admin.lyria.risadev.com \
                --non-interactive \
                --agree-tos \
                --email ${{ secrets.SMTP_USER }} \
                --redirect || {
                  echo "Certbot failed — creating self-signed certs for now..."
                  sudo mkdir -p /etc/letsencrypt/live/lyria.risadev.com
                  sudo openssl req -x509 -nodes -newkey rsa:2048 -days 365 \
                    -keyout /etc/letsencrypt/live/lyria.risadev.com/privkey.pem \
                    -out /etc/letsencrypt/live/lyria.risadev.com/fullchain.pem \
                    -subj "/CN=lyria.risadev.com"
                }
            else
              echo "SSL certs already exist, renewing if needed..."
              sudo certbot renew --quiet || true
            fi
          SSL

      - name: Test nginx and restart services
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'RESTART'
            set -e

            echo "Testing nginx config..."
            sudo nginx -t

            echo "Restarting lyria service..."
            sudo systemctl restart lyria

            echo "Restarting nginx..."
            sudo systemctl restart nginx

            sleep 3

            echo "=== Service status ==="
            sudo systemctl is-active lyria
            sudo systemctl is-active nginx

            echo "Deployment complete!"
          RESTART

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'HEALTHCHECK'
            set -e
            sleep 5

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9000/favicon.ico || echo "000")
            if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "404" ]; then
              echo "Health check failed! HTTP code: $HTTP_CODE"
              sudo journalctl -u lyria --no-pager -n 30
              exit 1
            fi

            echo "Health check passed! HTTP code: $HTTP_CODE"
          HEALTHCHECK

      - name: Rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ROLLBACK'
            echo "Deploy failed. Showing logs..."
            sudo journalctl -u lyria --no-pager -n 50 || true
            sudo nginx -t 2>&1 || true
            sudo systemctl status lyria --no-pager || true
          ROLLBACK
