name: Deploy Lyria!

on:
  push:
    branches: [main]

env:
  DEPLOY_PATH: /opt/lyria

jobs:
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build server binary
        working-directory: ./server
        run: |
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o lyria_server .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build admin panel
        working-directory: ./admin
        run: |
          npm ci
          VITE_API_URL=/api npm run build

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: server/lyria_server

      - name: Upload admin dist
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: admin/dist/

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: server-binary
          path: ./artifacts/server

      - name: Download admin dist
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: ./artifacts/admin

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server directories
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'PREP'
            set -e
            sudo -n mkdir -p /opt/lyria/server/uploads/{image/avatar,image/cover,image/playlist,image/music_cover,music,lyrics}
            sudo -n mkdir -p /opt/lyria/admin
            sudo -n mkdir -p /var/www/certbot
            sudo -n chown -R $USER:$USER /opt/lyria
          PREP

      - name: Install server dependencies
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'DEPS'
            set -e

            # Install nginx if not present
            if ! command -v nginx &>/dev/null; then
              echo "Installing nginx..."
              sudo -n apt-get update
              sudo -n apt-get install -y nginx
              sudo -n systemctl enable nginx
            fi

            # Install ffmpeg if not present
            if ! command -v ffmpeg &>/dev/null; then
              echo "Installing ffmpeg..."
              sudo -n apt-get update
              sudo -n apt-get install -y ffmpeg
            fi

            # Install/update yt-dlp (always update for YouTube compatibility)
            if ! command -v python3 &>/dev/null; then
              sudo -n apt-get install -y python3 python3-pip
            fi
            echo "Updating yt-dlp..."
            sudo -n pip3 install --break-system-packages --upgrade "yt-dlp[default]"

            echo "Dependencies OK"
            nginx -v
            ffmpeg -version | head -1
            yt-dlp --version
          DEPS

      - name: Deploy server binary
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sudo -n systemctl stop lyria || true"
          scp -i ~/.ssh/deploy_key ./artifacts/server/lyria_server \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/lyria/server/lyria_server
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "chmod +x /opt/lyria/server/lyria_server"

      - name: Deploy admin panel
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./artifacts/admin/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/lyria/admin/

      - name: Create .env file
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << ENVSETUP
            set -e
            cat > /opt/lyria/server/.env << 'ENVEOF'
          PORT=${{ secrets.SERVER_PORT }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          MONGODB_URL=${{ secrets.MONGODB_URL }}
          DOMAIN=${{ secrets.DOMAIN }}
          SERVER_URL=${{ secrets.SERVER_URL }}
          ENVIRONMENT=production
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}
          SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}
          ENVEOF
            echo ".env written"
          ENVSETUP

      - name: Setup MongoDB local and migrate data
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'MONGODB'
            set -e

            ATLAS_URI="mongodb+srv://pc-trabalho:rYNWsv3wsZWLaYNg@lyria.vrdoy.mongodb.net/Lyria?retryWrites=true&w=majority&appName=Lyria"
            LOCAL_URI="mongodb://admin:admin123@127.0.0.1:27017/Lyria?authSource=admin"

            # ── 0. Check AVX (required by MongoDB 5.0+) ────────────────────
            if ! grep -q avx /proc/cpuinfo; then
              echo "✗ CPU does not support AVX instructions (required by MongoDB 5.0+)."
              echo "  If this is a Proxmox/KVM/VMware VM, enable CPU passthrough:"
              echo "    Proxmox: set cpu type to 'host' in VM options"
              echo "    KVM/libvirt: add <cpu mode='host-passthrough'/> to VM XML"
              echo "    VMware: enable 'Expose hardware-assisted virtualization' or use cpu.features"
              exit 1
            fi
            echo "✓ AVX supported"

            # ── 1. Install MongoDB if not present ──────────────────────────
            if command -v mongod &>/dev/null; then
              echo "✓ MongoDB already installed: $(mongod --version | head -1)"
              sudo -n systemctl start mongod 2>/dev/null || true
              # Verify it actually came up (might be crashing due to prior bad config)
              sleep 3
              if ! sudo -n systemctl is-active --quiet mongod; then
                echo "✗ mongod failed to start! Logs:"
                sudo -n journalctl -u mongod --no-pager -n 30
                exit 1
              fi
            else
              echo "MongoDB not found. Installing MongoDB..."
              UBUNTU_CODENAME=$(lsb_release -cs 2>/dev/null || echo "jammy")

              # Remove any stale MongoDB repo files from previous attempts
              sudo -n rm -f /etc/apt/sources.list.d/mongodb-org-*.list
              sudo -n rm -f /usr/share/keyrings/mongodb-server-*.gpg

              # MongoDB 8.0 for Noble (24.04), 7.0 for older releases
              if [ "$UBUNTU_CODENAME" = "noble" ]; then
                MONGO_VERSION="8.0"
              else
                MONGO_VERSION="7.0"
              fi
              echo "Ubuntu: $UBUNTU_CODENAME → Using MongoDB $MONGO_VERSION"

              curl -fsSL "https://www.mongodb.org/static/pgp/server-${MONGO_VERSION}.asc" | \
                sudo -n gpg --batch --yes -o "/usr/share/keyrings/mongodb-server-${MONGO_VERSION}.gpg" --dearmor

              echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-${MONGO_VERSION}.gpg ] https://repo.mongodb.org/apt/ubuntu ${UBUNTU_CODENAME}/mongodb-org/${MONGO_VERSION} multiverse" | \
                sudo -n tee "/etc/apt/sources.list.d/mongodb-org-${MONGO_VERSION}.list"

              sudo -n apt-get update -qq
              sudo -n apt-get install -y mongodb-org
              sudo -n systemctl enable mongod
              sudo -n systemctl start mongod

              echo "Waiting for MongoDB to be ready (up to 60s)..."
              MONGOD_READY=false
              for i in $(seq 1 20); do
                if mongosh 127.0.0.1:27017 --eval "db.adminCommand('ping')" --quiet >/dev/null 2>&1; then
                  MONGOD_READY=true
                  break
                fi
                echo "  Attempt $i/20, waiting 3s..."
                sleep 3
              done
              if [ "$MONGOD_READY" = "false" ]; then
                echo "✗ mongod failed to start!"
                sudo -n systemctl status mongod --no-pager || true
                sudo -n journalctl -u mongod --no-pager -n 50
                exit 1
              fi
              echo "✓ mongod is up"

              # Create admin user (no-auth mode on first boot)
              mongosh 127.0.0.1:27017 --eval \
                "use admin; db.createUser({user:'admin',pwd:'admin123',roles:[{role:'root',db:'admin'}]});" || true

              # Enable authentication
              if ! sudo -n grep -q "authorization: enabled" /etc/mongod.conf; then
                printf '\nsecurity:\n  authorization: enabled\n' | sudo -n tee -a /etc/mongod.conf
              fi
              sudo -n systemctl restart mongod

              # Wait for mongod to come back after restart
              echo "Waiting for mongod to restart with auth..."
              for i in $(seq 1 10); do
                if mongosh "mongodb://admin:admin123@127.0.0.1:27017/?authSource=admin" \
                    --eval "db.adminCommand('ping')" --quiet >/dev/null 2>&1; then
                  break
                fi
                sleep 3
              done

              echo "✓ MongoDB $MONGO_VERSION installed and auth configured"
            fi

            # ── 2. Verify connection ────────────────────────────────────────
            echo "Verifying local MongoDB connection..."
            CONNECTED=false
            for i in 1 2 3 4 5; do
              if mongosh "$LOCAL_URI" --eval "db.adminCommand('ping')" --quiet >/dev/null 2>&1; then
                CONNECTED=true
                break
              fi
              echo "  Attempt $i/5, retrying in 3s..."
              sleep 3
            done
            if [ "$CONNECTED" = "false" ]; then
              echo "✗ Cannot connect to local MongoDB!"
              sudo -n journalctl -u mongod --no-pager -n 30
              exit 1
            fi
            echo "✓ Local MongoDB connection OK"

            # ── 3. Override .env to use local MongoDB ───────────────────────
            sed -i "s|MONGODB_URL=.*|MONGODB_URL=${LOCAL_URI}|" /opt/lyria/server/.env
            echo "✓ .env → MONGODB_URL set to local"

            # ── 4. Migrate from Atlas only if local DB is empty ─────────────
            COLLECTIONS=$(mongosh "$LOCAL_URI" --eval "db.getCollectionNames().length" --quiet 2>/dev/null | tail -1)

            if [ "$COLLECTIONS" = "0" ] || [ -z "$COLLECTIONS" ]; then
              echo "DB empty. Migrating from Atlas..."
              DUMP_DIR="/tmp/atlas_dump_$(date +%s)"
              mkdir -p "$DUMP_DIR"

              if mongodump --uri="$ATLAS_URI" --db=Lyria --out="$DUMP_DIR" --quiet; then
                mongorestore --uri="$LOCAL_URI" --db=Lyria "$DUMP_DIR/Lyria" --drop --quiet
                rm -rf "$DUMP_DIR"
                echo "✓ Atlas → local migration complete"
              else
                rm -rf "$DUMP_DIR"
                echo "⚠ Atlas dump failed. Server will start with empty DB."
                echo "  Make sure the Atlas cluster is still accessible."
              fi
            else
              echo "✓ DB already has $COLLECTIONS collections. Skipping migration."
            fi

            # ── 5. Report ───────────────────────────────────────────────────
            echo ""
            echo "═══════ MongoDB Status ═══════"
            mongosh "$LOCAL_URI" --quiet --eval \
              "db.getCollectionNames().forEach(c => print('  ' + c.padEnd(22) + db.getCollection(c).countDocuments() + ' docs'));" 2>/dev/null
            TOTAL=$(mongosh "$LOCAL_URI" --eval "db.getCollectionNames().length" --quiet 2>/dev/null | tail -1)
            echo "  ─────────────────────────────"
            echo "  Total collections: $TOTAL"
            echo "═════════════════════════════"
          MONGODB

      - name: Ensure cookies.txt exists
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "[ -f /opt/lyria/server/cookies.txt ] || touch /opt/lyria/server/cookies.txt"

      - name: Create systemd service
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'SERVICE'
            set -e
            sudo -n tee /etc/systemd/system/lyria.service > /dev/null << 'EOF'
          [Unit]
          Description=Lyria Server
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/lyria/server
          EnvironmentFile=/opt/lyria/server/.env
          Environment=PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          ExecStart=/opt/lyria/server/lyria_server
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

            sudo -n systemctl daemon-reload
            sudo -n systemctl enable lyria
            echo "Systemd service configured"
          SERVICE

      - name: Configure nginx and SSL for Lyria
        run: |
          scp -i ~/.ssh/deploy_key scripts/setup-nginx-ssl.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/setup-nginx-ssl.sh
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "chmod +x /tmp/setup-nginx-ssl.sh && sudo -n bash /tmp/setup-nginx-ssl.sh"


      - name: Restart services
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'RESTART'
            set -e

            echo "Restarting lyria service..."
            sudo -n systemctl restart lyria

            echo "Testing nginx config..."
            sudo -n nginx -t

            echo "Reloading nginx..."
            sudo -n systemctl reload nginx

            sleep 3

            echo "=== Service status ==="
            sudo -n systemctl is-active lyria
            sudo -n systemctl is-active nginx

            echo "Deployment complete!"
          RESTART

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'HEALTHCHECK'
            set -e
            sleep 5

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9000/health || echo "000")
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Health check failed! HTTP code: $HTTP_CODE"
              sudo -n journalctl -u lyria --no-pager -n 30
              exit 1
            fi

            echo "✓ Health check passed (HTTP $HTTP_CODE)"
          HEALTHCHECK

      - name: Rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ROLLBACK'
            echo "Deploy failed. Showing logs..."
            sudo -n journalctl -u lyria --no-pager -n 50 || true
            sudo -n nginx -t 2>&1 || true
            sudo -n systemctl status lyria --no-pager || true
          ROLLBACK
