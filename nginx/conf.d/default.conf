# API Server - accessible from mobile app
server {
    listen 80;
    server_name api.lyria.local _;

    # Allow internal network and WireGuard
    # Uncomment and adjust these for production
    # allow 192.168.15.0/24;
    # allow 10.0.0.0/24;  # WireGuard subnet - adjust as needed
    # deny all;

    location / {
        proxy_pass http://lyria-server:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming support
        proxy_buffering off;
        proxy_cache off;

        # WebSocket timeout
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Rate limiting for auth endpoints
        location /auth/login {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://lyria-server:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /auth/register {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://lyria-server:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

# Admin Panel - restricted to internal IPs only
server {
    listen 80;
    server_name admin.lyria.local;

    # Restrict to internal network and WireGuard only
    allow 192.168.15.0/24;
    allow 10.0.0.0/24;
    deny all;

    location / {
        proxy_pass http://lyria-admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://lyria-server:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
