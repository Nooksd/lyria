# Redirect HTTP -> HTTPS + serve Let's Encrypt challenge
server {
    listen 80;
    server_name lyria.risadev.com admin.lyria.risadev.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# API Server — mobile app connects here
server {
    listen 443 ssl;
    http2 on;
    server_name lyria.risadev.com;

    ssl_certificate     /etc/letsencrypt/live/lyria.risadev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lyria.risadev.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://lyria-server:9000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Streaming support
        proxy_buffering off;
        proxy_cache     off;

        # WebSocket / long poll timeout
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /auth/login {
        limit_req  zone=auth burst=3 nodelay;
        proxy_pass http://lyria-server:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/register {
        limit_req  zone=auth burst=3 nodelay;
        proxy_pass http://lyria-server:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin Panel — restricted by IP, proxies /api/ to Go server
server {
    listen 443 ssl;
    http2 on;
    server_name admin.lyria.risadev.com;

    ssl_certificate     /etc/letsencrypt/live/admin.lyria.risadev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.lyria.risadev.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Restrict admin panel to your IP — update with your actual IP
    # allow 203.0.113.0;   # your home/office IP
    # deny all;

    location / {
        proxy_pass         http://lyria-admin:80;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req  zone=api burst=20 nodelay;
        proxy_pass http://lyria-server:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

