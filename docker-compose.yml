services:
  lyria-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lyria-server
    restart: unless-stopped
    ports:
      - "9000:9000"
    env_file:
      - ./server/.env
    environment:
      - ENVIRONMENT=production
    volumes:
      - server-uploads:/app/uploads
      - /opt/lyria/cookies.txt:/app/cookies.txt:ro
    networks:
      - lyria-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/favicon.ico"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  lyria-admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: lyria-admin
    restart: unless-stopped
    depends_on:
      lyria-server:
        condition: service_healthy
    networks:
      - lyria-network

  nginx:
    image: nginx:alpine
    container_name: lyria-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      lyria-server:
        condition: service_healthy
      lyria-admin:
        condition: service_started
    networks:
      - lyria-network

  certbot:
    image: certbot/certbot:latest
    container_name: lyria-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Renew certificates twice a day; exits immediately if nothing to renew
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

volumes:
  server-uploads:
  certbot-conf:
  certbot-www:

networks:
  lyria-network:
    driver: bridge

